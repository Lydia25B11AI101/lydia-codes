<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web Calculator</title>
  <style>
    body { display: flex; justify-content: center; align-items: center;
           min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
    .calc { background: #16213e; border-radius: 20px; padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); width: 320px; }
    .display { background: #0f3460; color: #e94560; font-size: 2rem;
               text-align: right; padding: 16px; border-radius: 12px;
               margin-bottom: 16px; min-height: 64px; word-break: break-all; }
    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    button { padding: 18px; font-size: 1.1rem; border: none; border-radius: 10px;
             cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    button:active { transform: scale(0.95); }
    .num { background: #1a1a2e; color: #fff; }
    .op  { background: #e94560; color: #fff; }
    .eq  { background: #0f3460; color: #e94560; grid-column: span 2; }
    .clr { background: #533483; color: #fff; grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calc">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="clr" onclick="clearDisplay()">AC</button>
      <button class="op" onclick="append('/')">÷</button>
      <button class="op" onclick="append('*')">×</button>
      <button class="num" onclick="append('7')">7</button>
      <button class="num" onclick="append('8')">8</button>
      <button class="num" onclick="append('9')">9</button>
      <button class="op" onclick="append('-')">−</button>
      <button class="num" onclick="append('4')">4</button>
      <button class="num" onclick="append('5')">5</button>
      <button class="num" onclick="append('6')">6</button>
      <button class="op" onclick="append('+')">+</button>
      <button class="num" onclick="append('1')">1</button>
      <button class="num" onclick="append('2')">2</button>
      <button class="num" onclick="append('3')">3</button>
      <button class="num" onclick="append('0')">0</button>
      <button class="num" onclick="append('.')">.</button>
      <button class="eq" onclick="calculate()">=</button>
    </div>
  </div>
  <script>
    let expr = '';
    const disp = document.getElementById('display');
    function append(val) { expr += val; disp.textContent = expr; }
    function clearDisplay() { expr = ''; disp.textContent = '0'; }
    function calculate() {
      try { expr = String(eval(expr)); disp.textContent = expr; }
      catch { disp.textContent = 'Error'; expr = ''; }
    }
  </script>
</body>
</html>
