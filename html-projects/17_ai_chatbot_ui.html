<!DOCTYPE html>
<!-- Program Title: AI Chatbot Interface
     Author: Lydia S. Makiwa
     Date: 2026-05-05
     Description: A beautiful, responsive chatbot UI with message history,
                  typing animation, and canned AI responses. Simulates a
                  real AI chat interface — great portfolio piece. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LydIA — AI Chatbot</title>
<style>
  :root { --accent:#6C63FF; --bg:#0f0f1a; --surface:#1a1a2e; --card:#252540; --text:#e8e8f0; --muted:#888; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .chat-wrapper{ width:min(90vw,520px); height:90vh; display:flex; flex-direction:column; background:var(--surface); border-radius:20px; overflow:hidden; box-shadow:0 20px 60px rgba(108,99,255,.3); }
  .chat-header{ background:linear-gradient(135deg,var(--accent),#a855f7); padding:18px 22px; display:flex; align-items:center; gap:14px; }
  .avatar{ width:44px;height:44px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:1.4rem; }
  .header-info h2{ font-size:1.1rem; }
  .header-info p{ font-size:.78rem; opacity:.8; }
  .status-dot{ width:10px;height:10px;border-radius:50%;background:#4ade80;animation:pulse 2s infinite; margin-left:auto; }
  @keyframes pulse{ 0%,100%{opacity:1}50%{opacity:.4} }
  .messages{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth; }
  .messages::-webkit-scrollbar{ width:4px; }
  .messages::-webkit-scrollbar-thumb{ background:var(--accent); border-radius:4px; }
  .msg{ max-width:78%; padding:12px 16px; border-radius:18px; font-size:.9rem; line-height:1.5; animation:fadeIn .3s ease; }
  @keyframes fadeIn{ from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none} }
  .msg.user{ background:var(--accent); color:#fff; align-self:flex-end; border-bottom-right-radius:4px; }
  .msg.bot{ background:var(--card); align-self:flex-start; border-bottom-left-radius:4px; }
  .msg .time{ font-size:.7rem; opacity:.55; margin-top:4px; text-align:right; }
  .typing{ display:flex; gap:5px; align-items:center; padding:12px 16px; background:var(--card); border-radius:18px; border-bottom-left-radius:4px; align-self:flex-start; }
  .typing span{ width:7px;height:7px;border-radius:50%;background:var(--accent);animation:bounce .9s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s; }
  .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes bounce{ 0%,60%,100%{transform:none}30%{transform:translateY(-6px)} }
  .input-area{ padding:16px; background:var(--card); display:flex; gap:10px; align-items:center; }
  .input-area input{ flex:1;background:var(--surface);border:1.5px solid transparent;border-radius:25px;padding:11px 18px;color:var(--text);font-size:.9rem;outline:none;transition:.2s; }
  .input-area input:focus{ border-color:var(--accent); }
  .send-btn{ width:42px;height:42px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;color:#fff;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:transform .15s; }
  .send-btn:hover{ transform:scale(1.1); }
  .suggestions{ display:flex;flex-wrap:wrap;gap:8px;padding:0 20px 12px; }
  .sug-btn{ background:transparent;border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:5px 12px;font-size:.78rem;cursor:pointer;transition:.2s; }
  .sug-btn:hover{ background:var(--accent);color:#fff; }
</style>
</head>
<body>
<div class="chat-wrapper">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="header-info">
      <h2>LydIA</h2>
      <p>AI Assistant — always learning</p>
    </div>
    <div class="status-dot"></div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">
      Hey Lydia! 👋 I'm <strong>LydIA</strong>, your AI study buddy.
      Ask me anything about programming, AI, or AIML concepts!
      <div class="time">just now</div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <button class="sug-btn" onclick="quickSend(this)">What is Machine Learning?</button>
    <button class="sug-btn" onclick="quickSend(this)">Explain recursion</button>
    <button class="sug-btn" onclick="quickSend(this)">What is a neural network?</button>
    <button class="sug-btn" onclick="quickSend(this)">Help me with Python</button>
  </div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const responses = {
  "machine learning": "Machine Learning is a subset of AI where computers learn from data without being explicitly programmed. 🧠 There are 3 types: Supervised, Unsupervised, and Reinforcement Learning.",
  "neural network": "A neural network is inspired by the human brain! 🧬 It consists of layers of nodes (neurons) connected by weights. Input → Hidden Layers → Output.",
  "recursion": "Recursion is when a function calls itself! 🔄 Every recursive function needs a base case to stop. Example: factorial(n) = n × factorial(n-1), base: factorial(0) = 1.",
  "python": "Python is perfect for AI/ML! 🐍 Key libraries: NumPy (arrays), Pandas (data), Matplotlib (plots), Scikit-learn (ML), TensorFlow & Keras (deep learning).",
  "algorithm": "An algorithm is a step-by-step procedure to solve a problem. 📋 Key properties: correct, efficient (O notation), and unambiguous.",
  "data structure": "Data structures organize your data! 🗂️ Arrays, linked lists, stacks, queues, trees, graphs, hash tables — each has trade-offs in time/space complexity.",
  "hello": "Hello! 👋 Nice to chat! What would you like to learn today?",
  "hi": "Hi there! 😊 I'm here to help you become an amazing AI/ML engineer!",
  "gradient descent": "Gradient Descent minimises the loss function by nudging weights in the direction of steepest decrease. ⛰️ Learning rate α controls the step size.",
  "overfitting": "Overfitting means your model memorised training data but fails on new data. 😬 Fix it with: more data, dropout, regularisation (L1/L2), or early stopping.",
  "default": ["Great question! 🤔 I'm still learning — try asking about machine learning, neural networks, recursion, or Python!",
               "Interesting! 💡 Could you rephrase? I know ML, algorithms, data structures, and Python.",
               "I'm a simulated AI for now 😄 — ask about AIML concepts and I'll give you a solid answer!"]
};

let msgCount = 0;

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function appendMsg(text, role) {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${text}<div class="time">${getTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div  = document.createElement('div');
  div.className = 'typing'; div.id = 'typing';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function getBotReply(msg) {
  const lower = msg.toLowerCase();
  for (const key of Object.keys(responses)) {
    if (key !== 'default' && lower.includes(key)) return responses[key];
  }
  const def = responses['default'];
  return def[msgCount % def.length];
}

function sendMessage(text) {
  const input = document.getElementById('userInput');
  const msg   = (text || input.value).trim();
  if (!msg) return;
  appendMsg(msg, 'user');
  input.value = '';
  msgCount++;
  document.getElementById('suggestions').style.display = 'none';
  showTyping();
  setTimeout(() => {
    hideTyping();
    appendMsg(getBotReply(msg), 'bot');
  }, 800 + Math.random()*600);
}

function quickSend(btn) {
  sendMessage(btn.textContent);
}
</script>
</body>
</html>
