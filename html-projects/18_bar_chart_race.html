<!DOCTYPE html>
<!-- Program Title: Animated Bar Chart Visualiser
     Author: Lydia S. Makiwa
     Date: 2026-05-05
     Description: An interactive animated bar chart that races through
                  data over time — similar to "Bar Chart Race" videos.
                  Built with pure HTML5 Canvas and JavaScript. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Bar Chart Race — AI Framework Popularity</title>
<style>
  body{ margin:0; background:#0a0a14; color:#e8e8f0; font-family:'Segoe UI',sans-serif; display:flex; flex-direction:column; align-items:center; padding:20px; }
  h1{ font-size:1.5rem; margin-bottom:4px; background:linear-gradient(90deg,#6C63FF,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  p.sub{ color:#888; font-size:.85rem; margin-bottom:18px; }
  canvas{ border-radius:12px; background:#13131f; }
  .controls{ margin-top:18px; display:flex; gap:12px; }
  button{ padding:9px 22px; border:none; border-radius:20px; font-size:.9rem; cursor:pointer; transition:.2s; }
  .play-btn{ background:#6C63FF; color:#fff; }
  .play-btn:hover{ background:#5a52e0; }
  .reset-btn{ background:#252540; color:#e8e8f0; border:1px solid #6C63FF; }
  .reset-btn:hover{ background:#6C63FF; color:#fff; }
  #year-label{ font-size:2.5rem; font-weight:700; color:#6C63FF; margin-top:10px; }
</style>
</head>
<body>
<h1>📊 AI/ML Framework Popularity Race</h1>
<p class="sub">GitHub stars (thousands) — 2019 → 2024 | Author: Lydia S. Makiwa</p>
<canvas id="c" width="680" height="400"></canvas>
<div id="year-label">2019</div>
<div class="controls">
  <button class="play-btn" id="playBtn" onclick="togglePlay()">▶ Play</button>
  <button class="reset-btn" onclick="reset()">↺ Reset</button>
</div>

<script>
const data = {
  2019: {TensorFlow:148, PyTorch:28, Keras:47, Scikit:43, "Hugging Face":3},
  2020: {TensorFlow:155, PyTorch:45, Keras:51, Scikit:45, "Hugging Face":12},
  2021: {TensorFlow:162, PyTorch:62, Keras:55, Scikit:48, "Hugging Face":30},
  2022: {TensorFlow:172, PyTorch:80, Keras:57, Scikit:52, "Hugging Face":58},
  2023: {TensorFlow:178, PyTorch:100, Keras:60, Scikit:57, "Hugging Face":96},
  2024: {TensorFlow:184, PyTorch:122, Keras:62, Scikit:60, "Hugging Face":130},
};
const years  = Object.keys(data).map(Number);
const colors = ['#6C63FF','#f59e0b','#10b981','#f43f5e','#06b6d4'];
const names  = Object.keys(data[2019]);

let yearIdx = 0, anim = null, playing = false;
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function draw(yr) {
  ctx.clearRect(0, 0, W, H);
  const entries = names.map((n,i) => ({name:n, val:data[yr][n], color:colors[i]}));
  entries.sort((a,b) => b.val - a.val);
  const maxVal = Math.max(...entries.map(e=>e.val));
  const barH   = 44, padLeft = 150, padRight = 80, paddingTop = 30;

  entries.forEach((e, i) => {
    const y   = paddingTop + i * (barH + 12);
    const len = ((e.val / maxVal) * (W - padLeft - padRight));
    // Bar
    ctx.fillStyle = e.color + 'cc';
    ctx.beginPath();
    ctx.roundRect(padLeft, y, len, barH, 6);
    ctx.fill();
    // Name
    ctx.fillStyle = '#ccc';
    ctx.font = 'bold 14px Segoe UI';
    ctx.textAlign = 'right';
    ctx.fillText(e.name, padLeft - 10, y + barH/2 + 5);
    // Value
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.font = 'bold 13px Segoe UI';
    ctx.fillText(e.val + 'k ⭐', padLeft + len + 8, y + barH/2 + 5);
  });

  document.getElementById('year-label').textContent = yr;
}

draw(years[0]);

function step() {
  if (yearIdx >= years.length) { playing = false; document.getElementById('playBtn').textContent = '▶ Play'; return; }
  draw(years[yearIdx++]);
  anim = setTimeout(step, 900);
}

function togglePlay() {
  if (playing) {
    clearTimeout(anim); playing = false;
    document.getElementById('playBtn').textContent = '▶ Play';
  } else {
    playing = true;
    document.getElementById('playBtn').textContent = '⏸ Pause';
    if (yearIdx >= years.length) yearIdx = 0;
    step();
  }
}

function reset() {
  clearTimeout(anim); playing = false; yearIdx = 0;
  document.getElementById('playBtn').textContent = '▶ Play';
  draw(years[0]);
}
</script>
</body>
</html>
