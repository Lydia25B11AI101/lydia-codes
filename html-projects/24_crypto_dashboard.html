<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard Analyzer</title>
    <!--
      Program Title: Cryptocurrency Dashboard with Charts
      Author: Lydia S. Makiwa
      Date: June 2, 2026

      Description:
      An interactive single-page application displaying real-time cryptocurrency values
      using dynamic UI grids and Chart.js plots. Simulates a continuous trading feed.
    -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 1.5rem;
            color: #38bdf8;
        }
        .status-badge {
            background-color: #10b981;
            color: white;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .pulse {
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            animation: beat 1.5s infinite;
        }
        @keyframes beat {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .crypto-card {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .crypto-card:hover {
            transform: translateY(-4px);
        }
        .crypto-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .crypto-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .crypto-symbol {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .crypto-price {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .crypto-change {
            font-size: 0.9rem;
            font-weight: 600;
        }
        .change-up { color: #10b981; }
        .change-down { color: #ef4444; }
        
        .chart-container {
            background-color: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
        }
        .chart-container h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #94a3b8;
        }
        canvas {
            width: 100% !important;
            height: 350px !important;
        }
    </style>
    <!-- Import Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <header>
        <div>
            <h1>Lydia's Crypto Dashboard</h1>
            <p style="color: #94a3b8; font-size: 0.9rem;">Real-time algorithmic trade analysis</p>
        </div>
        <div class="status-badge">
            <span class="pulse"></span> Live Feed Active
        </div>
    </header>

    <!-- Crypto Value Grids -->
    <div class="grid-cards">
        <!-- BTC -->
        <div class="crypto-card">
            <div class="crypto-card-header">
                <span class="crypto-name">Bitcoin</span>
                <span class="crypto-symbol">BTC/USD</span>
            </div>
            <div class="crypto-price" id="btc-price">$67,420.00</div>
            <div class="crypto-change change-up" id="btc-change">+1.24%</div>
        </div>

        <!-- ETH -->
        <div class="crypto-card">
            <div class="crypto-card-header">
                <span class="crypto-name">Ethereum</span>
                <span class="crypto-symbol">ETH/USD</span>
            </div>
            <div class="crypto-price" id="eth-price">$3,480.00</div>
            <div class="crypto-change change-up" id="eth-change">+0.85%</div>
        </div>

        <!-- SOL -->
        <div class="crypto-card">
            <div class="crypto-card-header">
                <span class="crypto-name">Solana</span>
                <span class="crypto-symbol">SOL/USD</span>
            </div>
            <div class="crypto-price" id="sol-price">$148.50</div>
            <div class="crypto-change change-down" id="sol-change">-1.52%</div>
        </div>
    </div>

    <!-- Live Performance Chart -->
    <div class="chart-container">
        <h2>Hourly Performance (Interactive Chart)</h2>
        <canvas id="market-chart"></canvas>
    </div>

    <script>
        // Trackers for current values
        let btc = 67420.00;
        let eth = 3480.00;
        let sol = 148.50;

        // Interactive Chart Setup using Chart.js
        const ctx = document.getElementById('market-chart').getContext('2d');
        const labels = ['9:00 AM', '10:00 AM', '11:00 AM', '12:00 PM', '1:00 PM', '2:00 PM', '3:00 PM', '4:00 PM'];
        
        const marketChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'BTC Relative Change (%)',
                        data: [0, 0.4, -0.2, 0.5, 1.1, 0.9, 1.24, 1.5],
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.3
                    },
                    {
                        label: 'ETH Relative Change (%)',
                        data: [0, -0.3, 0.1, 0.4, 0.3, 0.6, 0.85, 1.1],
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.3
                    },
                    {
                        label: 'SOL Relative Change (%)',
                        data: [0, 1.2, 0.8, -0.5, -1.1, -1.8, -1.52, -1.1],
                        borderColor: '#14b8a6',
                        backgroundColor: 'rgba(20, 184, 166, 0.1)',
                        borderWidth: 2.5,
                        fill: true,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: '#94a3b8' }
                    }
                },
                scales: {
                    x: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } },
                    y: { ticks: { color: '#94a3b8' }, grid: { color: '#334155' } }
                }
            }
        });

        // Simulate Real-Time Market Variations
        setInterval(() => {
            // Apply randomized brownian movement logic
            const btcDelta = (Math.random() - 0.49) * 40;
            const ethDelta = (Math.random() - 0.49) * 3;
            const solDelta = (Math.random() - 0.51) * 0.4;

            btc += btcDelta;
            eth += ethDelta;
            sol += solDelta;

            // Render on DOM
            updateDOM('btc', btc, 67000);
            updateDOM('eth', eth, 3450);
            updateDOM('sol', sol, 150);
            
            // Increment chart live points
            const activeDataset = marketChart.data.datasets[0].data;
            activeDataset[activeDataset.length - 1] += (btcDelta / btc) * 100;
            marketChart.update('none'); // Update without full redraw
        }, 3000);

        function updateDOM(coin, price, baseline) {
            const priceEl = document.getElementById(`\${coin}-price`);
            const changeEl = document.getElementById(`\${coin}-change`);
            
            priceEl.innerText = `$\${price.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            
            const pctChange = ((price - baseline) / baseline) * 100;
            changeEl.innerText = `\${pctChange >= 0 ? '+' : ''}\${pctChange.toFixed(2)}%`;
            
            if (pctChange >= 0) {
                changeEl.className = 'crypto-change change-up';
            } else {
                changeEl.className = 'crypto-change change-down';
            }
        }
    </script>
</body>
</html>
