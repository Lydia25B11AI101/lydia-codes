<!DOCTYPE html>
<!-- ============================================================
     Program Title : BMI & Health Calculator
     Author        : Lydia S. Makiwa
     Date          : 2026-05-03
     Description   : Calculates BMI, ideal weight range, daily
                     calorie needs (TDEE), and hydration target.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💪 BMI & Health Calculator – Lydia Codes</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:#f0f4f8; font-family:'Segoe UI',sans-serif; display:flex;
          justify-content:center; padding:40px 20px; }
  .card { background:#fff; border-radius:16px; padding:36px; max-width:480px;
           width:100%; box-shadow:0 8px 32px rgba(0,0,0,.12); }
  h1   { text-align:center; color:#2d3436; margin-bottom:6px; }
  p.sub{ text-align:center; color:#636e72; margin-bottom:24px; font-size:.9rem; }
  label{ display:block; color:#555; margin-bottom:4px; font-size:.9rem; font-weight:600;}
  input,select { width:100%; padding:10px 14px; border:2px solid #dfe6e9;
                  border-radius:8px; margin-bottom:16px; font-size:1rem; }
  input:focus,select:focus { outline:none; border-color:#6c5ce7; }
  button{ width:100%; padding:13px; background:#6c5ce7; color:#fff; border:none;
           border-radius:8px; font-size:1.1rem; cursor:pointer; font-weight:600; }
  button:hover { background:#5a4bcf; }
  #results { margin-top:24px; display:none; }
  .metric { background:#f8f9fa; border-radius:10px; padding:14px 18px;
             margin-bottom:10px; display:flex; justify-content:space-between; }
  .metric .label { color:#636e72; font-size:.9rem; }
  .metric .value { font-weight:700; color:#2d3436; font-size:1.1rem; }
  #bmi-badge { text-align:center; padding:10px; border-radius:10px; margin-bottom:12px;
                font-weight:700; font-size:1.1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>💪 Health Calculator</h1>
  <p class="sub">BMI · Ideal Weight · Calories · Hydration</p>

  <label>Age (years)</label>
  <input type="number" id="age" min="1" max="120" placeholder="e.g. 20">

  <label>Gender</label>
  <select id="gender"><option value="male">Male</option><option value="female">Female</option></select>

  <label>Height (cm)</label>
  <input type="number" id="height" placeholder="e.g. 170">

  <label>Weight (kg)</label>
  <input type="number" id="weight" placeholder="e.g. 65">

  <label>Activity Level</label>
  <select id="activity">
    <option value="1.2">Sedentary (little exercise)</option>
    <option value="1.375">Lightly active (1-3 days/week)</option>
    <option value="1.55">Moderately active (3-5 days/week)</option>
    <option value="1.725">Very active (6-7 days/week)</option>
    <option value="1.9">Extra active (athlete)</option>
  </select>

  <button onclick="calculate()">Calculate</button>

  <div id="results">
    <div id="bmi-badge"></div>
    <div class="metric"><span class="label">BMI</span><span class="value" id="bmi-val">—</span></div>
    <div class="metric"><span class="label">Ideal Weight Range</span><span class="value" id="ideal">—</span></div>
    <div class="metric"><span class="label">Daily Calories (TDEE)</span><span class="value" id="tdee">—</span></div>
    <div class="metric"><span class="label">Daily Water Intake</span><span class="value" id="water">—</span></div>
  </div>
</div>
<script>
function calculate() {
  const age=+document.getElementById('age').value;
  const h=+document.getElementById('height').value;
  const w=+document.getElementById('weight').value;
  const g=document.getElementById('gender').value;
  const act=+document.getElementById('activity').value;

  if(!age||!h||!w) { alert('Please fill all fields'); return; }

  const bmi = w / ((h/100)**2);
  let cat,bg;
  if(bmi<18.5)     {cat='Underweight 🟡';bg='#ffeaa7';}
  else if(bmi<25)  {cat='Normal ✅';bg='#55efc4';}
  else if(bmi<30)  {cat='Overweight 🟠';bg='#fdcb6e';}
  else             {cat='Obese 🔴';bg='#ff7675';}

  const hm=h/100;
  const idealLow=(18.5*hm*hm).toFixed(1);
  const idealHigh=(24.9*hm*hm).toFixed(1);

  // Mifflin-St Jeor BMR
  const bmr = g==='male'
    ? 10*w + 6.25*h - 5*age + 5
    : 10*w + 6.25*h - 5*age - 161;
  const tdee = (bmr*act).toFixed(0);
  const water = (w*0.033).toFixed(1);

  document.getElementById('bmi-badge').style.background=bg;
  document.getElementById('bmi-badge').textContent='BMI Category: '+cat;
  document.getElementById('bmi-val').textContent=bmi.toFixed(1);
  document.getElementById('ideal').textContent=idealLow+' – '+idealHigh+' kg';
  document.getElementById('tdee').textContent=tdee+' kcal/day';
  document.getElementById('water').textContent=water+' L/day';
  document.getElementById('results').style.display='block';
}
</script>
</body>
</html>
