<!DOCTYPE html>
<!--
  Program Title : Password Strength Checker
  Author        : Lydia S. Makiwa
  Date          : 2026-05-02
  Description   : Real-time password strength meter with
                  visual feedback and requirement checklist.
-->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Checker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#0f172a;min-height:100vh;
         display:flex;align-items:center;justify-content:center}
    .card{background:#1e293b;border-radius:16px;padding:40px 36px;width:420px;
          box-shadow:0 20px 60px rgba(0,0,0,.5)}
    h1{color:#f1f5f9;text-align:center;font-size:1.6rem;margin-bottom:8px}
    p.sub{color:#94a3b8;text-align:center;font-size:.9rem;margin-bottom:28px}
    .field{position:relative}
    input{width:100%;padding:14px 44px 14px 16px;background:#0f172a;
          border:2px solid #334155;border-radius:10px;color:#e2e8f0;
          font-size:1rem;outline:none;transition:.2s}
    input:focus{border-color:#6366f1}
    .toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);
            cursor:pointer;font-size:1.2rem}
    .bar-wrap{height:8px;background:#334155;border-radius:4px;margin:14px 0 4px}
    .bar{height:100%;border-radius:4px;width:0;transition:width .4s,background .4s}
    .label{color:#94a3b8;font-size:.85rem;text-align:right;margin-bottom:16px}
    .checks{list-style:none}
    .checks li{display:flex;align-items:center;gap:8px;padding:5px 0;
               font-size:.88rem;color:#64748b;transition:.3s}
    .checks li.ok{color:#4ade80}
    .checks li::before{content:"✗";color:#ef4444;font-weight:700}
    .checks li.ok::before{content:"✓";color:#4ade80}
  </style>
</head>
<body>
<div class="card">
  <h1>🔒 Password Checker</h1>
  <p class="sub">Type a password to see its strength</p>
  <div class="field">
    <input type="password" id="pwd" placeholder="Enter password..." oninput="check()"/>
    <span class="toggle" onclick="toggle()">👁️</span>
  </div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  <div class="label" id="lbl">—</div>
  <ul class="checks">
    <li id="c-len">At least 8 characters</li>
    <li id="c-up">Uppercase letter (A-Z)</li>
    <li id="c-lo">Lowercase letter (a-z)</li>
    <li id="c-num">Number (0-9)</li>
    <li id="c-sym">Special character (!@#$...)</li>
  </ul>
</div>
<script>
const colors = ['#ef4444','#f97316','#facc15','#4ade80','#22c55e'];
const labels = ['Very Weak','Weak','Fair','Strong','Very Strong'];
const widths = ['20%','40%','60%','80%','100%'];

function check(){
  const v = document.getElementById('pwd').value;
  const rules = [
    [/[A-Z]/,'c-up'],[/[a-z]/,'c-lo'],
    [/[0-9]/,'c-num'],[/[^A-Za-z0-9]/,'c-sym']
  ];
  let score = 0;
  document.getElementById('c-len').classList.toggle('ok',v.length>=8);
  if(v.length>=8) score++;
  rules.forEach(([re,id])=>{
    const ok=re.test(v);
    document.getElementById(id).classList.toggle('ok',ok);
    if(ok) score++;
  });
  const bar=document.getElementById('bar');
  bar.style.width  = score?widths[score-1]:'0';
  bar.style.background = score?colors[score-1]:'transparent';
  document.getElementById('lbl').textContent = score?labels[score-1]:'—';
}

function toggle(){
  const inp=document.getElementById('pwd');
  inp.type = inp.type==='password'?'text':'password';
}
</script>
</body>
</html>
