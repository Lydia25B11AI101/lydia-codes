<!DOCTYPE html>
<html lang='en'>
<head>
<!-- ============================================================
  Project Title : Live Markdown Previewer
  Author        : Lydia S. Makiwa
  Date          : 2026-05-04
  Description   : Type Markdown on the left, see rendered HTML
                  on the right in real time. Pure vanilla JS.
  ============================================================ -->
<meta charset='UTF-8'>
<title>Markdown Previewer - Lydia Codes</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0d1117; color:#c9d1d9; font-family:'Segoe UI',sans-serif;
       display:flex; flex-direction:column; height:100vh; }
header { background:#161b22; padding:14px 24px; display:flex;
         align-items:center; justify-content:space-between;
         border-bottom:1px solid #30363d; }
header h1 { font-size:1.3rem; color:#58a6ff; }
#panels { display:flex; flex:1; overflow:hidden; }
.pane { flex:1; display:flex; flex-direction:column; }
.pane-head { background:#161b22; padding:8px 14px; font-size:.85rem;
             color:#8b949e; border-bottom:1px solid #30363d; }
textarea { flex:1; background:#0d1117; color:#c9d1d9; border:none;
           padding:16px; font-size:.95rem; font-family:'Courier New',monospace;
           resize:none; outline:none; border-right:1px solid #30363d; }
#preview { flex:1; padding:16px; overflow-y:auto; line-height:1.6; }
#preview h1,#preview h2,#preview h3 { color:#58a6ff; margin:12px 0 6px; }
#preview code { background:#161b22; padding:2px 6px; border-radius:4px;
                font-family:monospace; color:#ff7b72; }
#preview pre  { background:#161b22; padding:12px; border-radius:8px;
                overflow-x:auto; margin:8px 0; }
#preview pre code { background:none; padding:0; }
#preview blockquote { border-left:3px solid #58a6ff; padding-left:12px;
                      color:#8b949e; margin:8px 0; }
#preview a { color:#58a6ff; }
#preview ul,#preview ol { margin-left:20px; }
#preview hr { border:none; border-top:1px solid #30363d; }
#preview strong { color:#ffa657; }
#preview em { color:#7ee787; }
</style>
</head>
<body>
<header>
  <h1>✏️ Live Markdown Previewer</h1>
  <span>by Lydia S. Makiwa</span>
</header>
<div id='panels'>
  <div class='pane'><div class='pane-head'>📝 Markdown Editor</div>
    <textarea id='editor' spellcheck='false'></textarea></div>
  <div class='pane'><div class='pane-head'>👁️ Preview</div>
    <div id='preview'></div></div>
</div>
<script>
const DEFAULT = '# Hello Markdown!\n\n**Bold** and *italic* text and inline code.\n\n'  + '## Features\n- Live preview\n- No libraries\n- By Lydia S. Makiwa\n\n'  + '> Blockquote example\n\n[GitHub](https://github.com/Lydia25B11AI101)';

function md(src){
  return src
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/gm,function(_,c){return '<pre><code>'+c.trim()+'</code></pre>';})
    .replace(/^### (.+)/gm,'<h3>$1</h3>')
    .replace(/^## (.+)/gm,'<h2>$1</h2>')
    .replace(/^# (.+)/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^> (.+)/gm,'<blockquote>$1</blockquote>')
    .replace(/^- (.+)/gm,'<li>$1</li>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2">$1</a>')
    .replace(/^---$/gm,'<hr>')
    .replace(/\n\n/g,'<br><br>');
}
const editor=document.getElementById('editor');
const preview=document.getElementById('preview');
editor.value=DEFAULT;
preview.innerHTML=md(DEFAULT);
editor.addEventListener('input',function(){preview.innerHTML=md(editor.value);});
</script>
</body>
</html>
