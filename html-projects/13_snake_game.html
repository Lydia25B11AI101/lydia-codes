<!DOCTYPE html>
<!-- ============================================================
     Program Title : Snake Game
     Author        : Lydia S. Makiwa
     Date          : 2026-05-03
     Description   : Classic Snake game in pure HTML/CSS/JS —
                     arrow keys to move, eat food to grow.
     ============================================================ -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Snake Game – Lydia Codes</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1a2e; color: #eee; font-family: 'Segoe UI', sans-serif;
          display: flex; flex-direction: column; align-items: center; justify-content: center;
          min-height: 100vh; }
  h1   { font-size: 2rem; margin-bottom: 10px; color: #00d4aa; }
  #scoreboard { display: flex; gap: 40px; margin-bottom: 16px; font-size: 1.1rem; }
  #scoreboard span { color: #f9ca24; font-weight: bold; }
  canvas { background: #0f0f23; border: 3px solid #00d4aa; border-radius: 8px; }
  #msg { margin-top: 16px; font-size: 1.2rem; min-height: 28px; color: #ff6b6b; }
  button { margin-top: 12px; padding: 10px 30px; background: #00d4aa; color: #000;
            border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #00b898; }
</style>
</head>
<body>
<h1>🐍 Snake Game</h1>
<div id="scoreboard">Score: <span id="score">0</span> &nbsp; Best: <span id="best">0</span></div>
<canvas id="canvas" width="400" height="400"></canvas>
<div id="msg">Press Start or Space to play</div>
<button onclick="startGame()">▶ Start / Restart</button>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const CELL   = 20, COLS = 20, ROWS = 20;
const COLORS = { head:'#00d4aa', body:'#00a884', food:'#ff6b6b', eye:'#1a1a2e' };

let snake, dir, food, score, best = 0, loop, running = false;

function startGame() {
  clearInterval(loop);
  snake   = [{x:10,y:10}, {x:9,y:10}, {x:8,y:10}];
  dir     = {x:1,y:0};
  score   = 0;
  running = true;
  placeFood();
  updateScore();
  document.getElementById('msg').textContent = 'Use ← ↑ → ↓ to move';
  loop = setInterval(tick, 120);
}

function placeFood() {
  do { food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS ||
      snake.some(s=>s.x===head.x && s.y===head.y)) {
    clearInterval(loop); running=false;
    if(score>best){best=score; document.getElementById('best').textContent=best;}
    document.getElementById('msg').textContent='💀 Game Over! Score: '+score;
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) { score+=10; updateScore(); placeFood(); }
  else snake.pop();
  draw();
}

function draw() {
  ctx.fillStyle='#0f0f23'; ctx.fillRect(0,0,canvas.width,canvas.height);
  // Draw food
  ctx.fillStyle=COLORS.food;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  // Draw snake
  snake.forEach((seg,i)=>{
    ctx.fillStyle = i===0 ? COLORS.head : COLORS.body;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, 4);
    ctx.fill();
  });
  // Eyes on head
  const h=snake[0], ex=h.x*CELL, ey=h.y*CELL;
  ctx.fillStyle=COLORS.eye;
  ctx.beginPath(); ctx.arc(ex+6,ey+6,2.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(ex+14,ey+6,2.5,0,Math.PI*2); ctx.fill();
}

function updateScore() { document.getElementById('score').textContent=score; }

document.addEventListener('keydown', e=>{
  if(!running) return;
  const map = {'ArrowUp':{x:0,y:-1},'ArrowDown':{x:0,y:1},
                'ArrowLeft':{x:-1,y:0},'ArrowRight':{x:1,y:0}};
  const nd=map[e.key];
  if(nd && !(nd.x===-dir.x && nd.y===-dir.y)) { dir=nd; e.preventDefault(); }
  if(e.code==='Space') startGame();
});
</script>
</body>
</html>
