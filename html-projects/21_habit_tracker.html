  Description:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a1a;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 25px 0;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b, #ef4444, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #64748b;
            margin-top: 5px;
            font-size: 0.9rem;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }

        .stat-card .number {
            font-size: 1.6rem;
            font-weight: 700;
        }

        .stat-card .label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .stat-card.orange .number { color: #fb923c; }
        .stat-card.green .number { color: #4ade80; }
        .stat-card.blue .number { color: #60a5fa; }
        .stat-card.purple .number { color: #a78bfa; }

        .habits-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .section-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .add-habit-form {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .add-habit-form input,
        .add-habit-form select {
            padding: 10px 14px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #e2e8f0;
            outline: none;
            font-size: 0.9rem;
        }

        .add-habit-form input:focus,
        .add-habit-form select:focus {
            border-color: #f59e0b;
        }

        .add-habit-form input[type="text"] {
            flex: 1;
            min-width: 180px;
        }

        .add-habit-form select option {
            background: #1a1a2e;
            color: #e2e8f0;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: #fff;
        }

        .btn-small {
            padding: 5px 10px;
            font-size: 0.75rem;
        }

        .btn-danger { background: rgba(239,68,68,0.2); color: #fca5a5; }
        .btn-edit { background: rgba(96,165,250,0.2); color: #93c5fd; }

        .habit-item {
            display: flex;
            align-items: center;
            padding: 14px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.2s;
        }

        .habit-item:last-child { border-bottom: none; }

        .habit-item:hover {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .habit-color {
            width: 4px;
            height: 32px;
            border-radius: 2px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .habit-info {
            flex: 1;
        }

        .habit-name {
            font-weight: 500;
        }

        .habit-streak {
            font-size: 0.8rem;
            color: #64748b;
        }

        .habit-streak strong {
            color: #fb923c;
        }

        .habit-check-area {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .check-btn {
            width: 36px;
            height: 36px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .check-btn:hover {
            border-color: #4ade80;
            background: rgba(74,222,128,0.1);
        }

        .check-btn.checked {
            background: #4ade80;
            border-color: #4ade80;
            color: #0a0a1a;
        }

        .weekly-preview {
            display: flex;
            gap: 4px;
            margin-left: 12px;
        }

        .week-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            background: rgba(255,255,255,0.08);
        }

        .week-dot.done {
            background: #4ade80;
        }

        .week-dot.partial {
            background: #fbbf24;
        }

        /* Heatmap */
        .heatmap-section {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .heatmap-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
        }

        .heatmap-controls select {
            padding: 8px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #e2e8f0;
            outline: none;
        }

        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .heatmap-header {
            text-align: center;
            font-size: 0.7rem;
            color: #64748b;
            padding: 4px 0;
        }

        .heatmap-cell {
            aspect-ratio: 1;
            border-radius: 4px;
            min-height: 20px;
            cursor: pointer;
            position: relative;
            transition: transform 0.15s;
        }

        .heatmap-cell:hover {
            transform: scale(1.2);
            z-index: 2;
        }

        .heatmap-cell.level-0 { background: rgba(255,255,255,0.05); }
        .heatmap-cell.level-1 { background: rgba(74,222,128,0.15); }
        .heatmap-cell.level-2 { background: rgba(74,222,128,0.35); }
        .heatmap-cell.level-3 { background: rgba(74,222,128,0.55); }
        .heatmap-cell.level-4 { background: rgba(74,222,128,0.75); }
        .heatmap-cell.level-5 { background: #4ade80; }

        .heatmap-legend {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: flex-end;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .heatmap-legend .swatch {
            width: 14px;
            height: 14px;
            border-radius: 3px;
        }

        .empty-state {
            text-align: center;
            padding: 30px;
            color: #64748b;
        }

        .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 25px;
            width: 340px;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: #e2e8f0;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: #e2e8f0;
            outline: none;
            margin-bottom: 12px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.06);
            color: #64748b;
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🔥 Habit Tracker</h1>
        <p>Build streaks, track daily progress, stay consistent</p>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
        <div class="stat-card orange">
            <div class="number" id="totalStreak">0</div>
            <div class="label">Best Streak</div>
        </div>
        <div class="stat-card green">
            <div class="number" id="todayCount">0</div>
            <div class="label">Done Today</div>
        </div>
        <div class="stat-card blue">
            <div class="number" id="activeHabits">0</div>
            <div class="label">Active Habits</div>
        </div>
        <div class="stat-card purple">
            <div class="number" id="completionRate">0%</div>
            <div class="label">This Week</div>
        </div>
    </div>

    <!-- Habits -->
    <div class="habits-section">
        <div class="section-header">
            <h2>📋 My Habits</h2>
            <button class="btn btn-primary" onclick="showAddModal()">+ Add Habit</button>
        </div>

        <div id="habitList">
            <div class="empty-state">
                <div class="icon">🎯</div>
                <p>No habits yet. Add your first habit!</p>
            </div>
        </div>
    </div>

    <!-- Heatmap -->
    <div class="heatmap-section">
        <div class="section-header">
            <h2>🗓 Activity Heatmap</h2>
        </div>
        <div class="heatmap-controls">
            <select id="heatmapHabit" onchange="renderHeatmap()"></select>
            <span style="color: #64748b; font-size: 0.85rem;">
                <span id="heatmapDates">Last 7 weeks</span>
            </span>
        </div>
        <div id="heatmapContainer">
            <div class="empty-state">
                <p>Select a habit to see your activity heatmap</p>
            </div>
        </div>
        <div class="heatmap-legend">
            <span>Less</span>
            <div class="swatch level-0"></div>
            <div class="swatch level-1"></div>
            <div class="swatch level-2"></div>
            <div class="swatch level-3"></div>
            <div class="swatch level-4"></div>
            <div class="swatch level-5"></div>
            <span>More</span>
        </div>
    </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="habitModal">
    <div class="modal-content">
        <h3 id="modalTitle">Add New Habit</h3>
        <input type="text" id="modalName" placeholder="Habit name (e.g. Read 30 mins)">
        <select id="modalColor">
            <option value="#f59e0b">Amber</option>
            <option value="#4ade80">Green</option>
            <option value="#60a5fa">Blue</option>
            <option value="#a78bfa">Purple</option>
            <option value="#f87171">Red</option>
            <option value="#f472b6">Pink</option>
            <option value="#34d399">Emerald</option>
        </select>
        <select id="modalFrequency">
            <option value="daily">Daily</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekends">Weekends</option>
        </select>
        <div class="modal-actions">
            <button class="btn btn-cancel" onclick="hideModal()">Cancel</button>
            <button class="btn btn-primary" id="modalSaveBtn" onclick="saveHabit()">Save</button>
        </div>
    </div>
</div>

<script>
    // ===== DATA LAYER =====
    let habits = JSON.parse(localStorage.getItem('habit_tracker_habits') || '[]');
    let editingId = null;
    const COLORS = ['#f59e0b','#4ade80','#60a5fa','#a78bfa','#f87171','#f472b6','#34d399'];

    function today() {
        return new Date().toISOString().split('T')[0];
    }

    function isToday(dateStr) {
        return dateStr === today();
    }

    function getDaysInRange(days) {
        const dates = [];
        for (let i = days - 1; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            dates.push(d.toISOString().split('T')[0]);
        }
        return dates;
    }

    function formatDisplay(dateStr) {
        const d = new Date(dateStr + 'T00:00:00');
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}`;
    }

    // ===== CORE FUNCTIONS =====
    function toggleCheck(habitId, dateStr) {
        const habit = habits.find(h => h.id === habitId);
        if (!habit) return;

        if (!habit.logs) habit.logs = {};
        if (habit.logs[dateStr]) {
            delete habit.logs[dateStr];
        } else {
            habit.logs[dateStr] = true;
        }

        saveAndRender();
    }

    function calcStreak(habit) {
        const logs = habit.logs || {};
        let streak = 0;
        const d = new Date();

        // Check if today is logged
        const todayStr = today();
        if (!logs[todayStr]) {
            // Check yesterday
            d.setDate(d.getDate() - 1);
        }

        while (true) {
            const dateStr = d.toISOString().split('T')[0];
            if (logs[dateStr]) {
                streak++;
                d.setDate(d.getDate() - 1);
            } else {
                break;
            }
        }
        return streak;
    }

    function calcBestStreak(habit) {
        const logs = habit.logs || {};
        const dates = Object.keys(logs).sort();
        if (dates.length === 0) return 0;

        let best = 1;
        let current = 1;

        for (let i = 1; i < dates.length; i++) {
            const prev = new Date(dates[i-1] + 'T00:00:00');
            const curr = new Date(dates[i] + 'T00:00:00');
            const diff = (curr - prev) / (1000 * 60 * 60 * 24);
            if (diff === 1) {
                current++;
                best = Math.max(best, current);
            } else {
                current = 1;
            }
        }

        return Math.max(best, dates.length > 0 ? 1 : 0);
    }

    // ===== UI RENDERING =====
    function renderHabits() {
        const list = document.getElementById('habitList');

        if (habits.length === 0) {
            list.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>No habits yet. Add your first habit!</p></div>`;
            return;
        }

        list.innerHTML = habits.map(habit => {
            const streak = calcStreak(habit);
            const bestStreak = calcBestStreak(habit);
            const isChecked = habit.logs && habit.logs[today()];

            // Weekly preview
            const weekDates = getDaysInRange(7);
            const weekDots = weekDates.map(d => {
                const done = habit.logs && habit.logs[d];
                return `<div class="week-dot ${done ? 'done' : ''}"></div>`;
            }).join('');

            return `
                <div class="habit-item">
                    <div class="habit-color" style="background: ${habit.color || '#f59e0b'}"></div>
                    <div class="habit-info">
                        <div class="habit-name">${escapeHtml(habit.name)}</div>
                        <div class="habit-streak">
                            🔥 <strong>${streak}</strong> day streak · Best: ${bestStreak}
                            · ${habit.frequency || 'daily'}
                        </div>
                    </div>
                    <div class="habit-check-area">
                        <div class="weekly-preview">${weekDots}</div>
                        <button class="check-btn ${isChecked ? 'checked' : ''}"
                                onclick="toggleCheck(${habit.id}, '${today()}')"
                                title="${isChecked ? 'Uncheck' : 'Check'} today">
                            ${isChecked ? '✓' : ''}
                        </button>
                        <button class="btn btn-small btn-edit" onclick="showEditModal(${habit.id})">✎</button>
                        <button class="btn btn-small btn-danger" onclick="deleteHabit(${habit.id})">✕</button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function updateStats() {
        // Best overall streak
        let bestStreak = 0;
        habits.forEach(h => {
            bestStreak = Math.max(bestStreak, calcBestStreak(h));
        });
        document.getElementById('totalStreak').textContent = bestStreak;

        // Today's completions
        const todayStr = today();
        const todayCount = habits.filter(h => h.logs && h.logs[todayStr]).length;
        document.getElementById('todayCount').textContent = todayCount;
        document.getElementById('activeHabits').textContent = habits.length;

        // Weekly completion rate
        const weekDates = getDaysInRange(7);
        let totalChecks = 0;
        let possibleChecks = 0;
        weekDates.forEach(d => {
            habits.forEach(h => {
                possibleChecks++;
                if (h.logs && h.logs[d]) totalChecks++;
            });
        });
        const rate = possibleChecks > 0 ? Math.round((totalChecks / possibleChecks) * 100) : 0;
        document.getElementById('completionRate').textContent = rate + '%';
    }

    // ===== HEATMAP =====
    function renderHeatmap() {
        const container = document.getElementById('heatmapContainer');
        const select = document.getElementById('heatmapHabit');
        const habitId = parseInt(select.value);

        if (!habitId) {
            container.innerHTML = `<div class="empty-state"><p>Select a habit to see your activity heatmap</p></div>`;
            return;
        }

        const habit = habits.find(h => h.id === habitId);
        if (!habit) return;

        const logs = habit.logs || {};

        // Build 7 weeks of data (49 days)
        const weeks = 7;
        const grid = [];
        const startDate = new Date();
        startDate.setDate(startDate.getDate() - (weeks * 7 - 1));
        // Align to Sunday
        startDate.setDate(startDate.getDate() - startDate.getDay());

        for (let w = 0; w < weeks; w++) {
            const week = [];
            for (let d = 0; d < 7; d++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + (w * 7) + d);
                const dateStr = date.toISOString().split('T')[0];
                week.push({
                    date: dateStr,
                    done: !!logs[dateStr],
                    display: formatDisplay(dateStr)
                });
            }
            grid.push(week);
        }

        const dayHeaders = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        let html = '<div class="heatmap-header-row" style="display:grid;grid-template-columns:auto repeat(7,1fr);gap:4px;align-items:center;">';
        html += '<div></div>';
        dayHeaders.forEach(d => {
            html += `<div class="heatmap-header">${d}</div>`;
        });
        html += '</div>';

        html += '<div class="heatmap-grid" style="grid-template-rows:auto;">';

        for (let d = 0; d < 7; d++) {
            html += `<div class="heatmap-header">${dayHeaders[d]}</div>`;
            for (let w = 0; w < weeks; w++) {
                const cell = grid[w][d];
                // Check if this date is in the past or today (not future)
                const cellDate = new Date(cell.date + 'T00:00:00');
                const now = new Date();
                now.setHours(0,0,0,0);
                const isFuture = cellDate > now;

                let level = 'level-0';
                if (cell.done && !isFuture) level = 'level-5';
                else if (isFuture) level = 'level-0';

                const title = cell.display + (cell.done ? ' ✓' : '');
                html += `<div class="heatmap-cell ${level}" title="${title}" 
                              style="opacity: ${isFuture ? 0.2 : 1}"></div>`;
            }
        }

        html += '</div>';

        const startStr = new Date(startDate).toLocaleDateString('en-US', {month:'short', day:'numeric'});
        const endStr = new Date().toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
        document.getElementById('heatmapDates').textContent = `${startStr} – ${endStr}`;

        container.innerHTML = html;
    }

    function populateHeatmapSelect() {
        const select = document.getElementById('heatmapHabit');
        select.innerHTML = '<option value="">Select a habit...</option>' +
            habits.map(h => `<option value="${h.id}">${escapeHtml(h.name)}</option>`).join('');
    }

    // ===== MODAL =====
    function showAddModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Add New Habit';
        document.getElementById('modalSaveBtn').textContent = 'Add Habit';
        document.getElementById('modalName').value = '';
        document.getElementById('modalColor').value = '#f59e0b';
        document.getElementById('modalFrequency').value = 'daily';
        document.getElementById('habitModal').classList.add('active');
        document.getElementById('modalName').focus();
    }

    function showEditModal(id) {
        const habit = habits.find(h => h.id === id);
        if (!habit) return;
        editingId = id;
        document.getElementById('modalTitle').textContent = 'Edit Habit';
        document.getElementById('modalSaveBtn').textContent = 'Save Changes';
        document.getElementById('modalName').value = habit.name;
        document.getElementById('modalColor').value = habit.color || '#f59e0b';
        document.getElementById('modalFrequency').value = habit.frequency || 'daily';
        document.getElementById('habitModal').classList.add('active');
        document.getElementById('modalName').focus();
    }

    function hideModal() {
        document.getElementById('habitModal').classList.remove('active');
        editingId = null;
    }

    function saveHabit() {
        const name = document.getElementById('modalName').value.trim();
        const color = document.getElementById('modalColor').value;
        const frequency = document.getElementById('modalFrequency').value;

        if (!name) return;

        if (editingId) {
            const habit = habits.find(h => h.id === editingId);
            if (habit) {
                habit.name = name;
                habit.color = color;
                habit.frequency = frequency;
            }
        } else {
            habits.push({
                id: Date.now(),
                name,
                color,
                frequency,
                logs: {}
            });
        }

        hideModal();
        saveAndRender();
    }

    function deleteHabit(id) {
        if (!confirm('Delete this habit? All progress will be lost.')) return;
        habits = habits.filter(h => h.id !== id);
        saveAndRender();
    }

    // ===== PERSISTENCE =====
    function saveAndRender() {
        localStorage.setItem('habit_tracker_habits', JSON.stringify(habits));
        renderHabits();
        updateStats();
        populateHeatmapSelect();
        renderHeatmap();
    }

    // ===== INIT =====
    renderHabits();
    updateStats();
    populateHeatmapSelect();
    renderHeatmap();

    // Close modal on outside click
    document.getElementById('habitModal').addEventListener('click', function(e) {
        if (e.target === this) hideModal();
    });

    // Enter key in modal
    document.getElementById('modalName').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') saveHabit();
    });
</script>
</body>
</html>
